name: CI/CD Pipeline - Spring Boot to Kubernetes

on:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - master
  workflow_dispatch:

env:
  REGISTRY: ${{ secrets.HARBOR_REGISTRY }}
  PROJECT: ${{ secrets.HARBOR_PROJECT }}
  IMAGE_NAME: my-app

jobs:
  # Job 1: 코드 빌드 및 테스트
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout source code
        uses: actions/checkout@v4
      
      - name: ☕ Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      
      - name: 🔧 Grant execute permission for gradlew
        run: chmod +x ./gradlew
      
      - name: 🏗️ Build with Gradle
        run: ./gradlew clean build -x test --no-daemon
      
      - name: ✅ Run unit tests
        run: ./gradlew test --no-daemon
      
      - name: 📦 Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: jar-file
          path: build/libs/
          retention-days: 5

  # Job 2: Docker 이미지 빌드 및 Harbor Push
  push-image:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    
    # CD 단계에서 태그를 사용할 수 있도록 output 설정
    outputs:
      short_sha: ${{ steps.meta.outputs.short_sha }}
    
    steps:
      - name: 📥 Checkout source code
        uses: actions/checkout@v4
      
      - name: 📥 Download build artifacts
        uses: actions/download-artifact@v3
        with:
          name: jar-file
          path: build/libs/
      
      - name: 🏷️ Generate image tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          TIMESTAMP=$(date +%Y%m%d-%H%M)
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "timestamp=${TIMESTAMP}" >> $GITHUB_OUTPUT
          echo "Image tag: ${SHORT_SHA}"
      
      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: 🔐 Log in to Harbor Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}
      
      - name: 🚀 Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.short_sha }}
            ${{ env.REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Job 3: Kubernetes 클러스터에 배포 (CD)
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: push-image
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    
    steps:
      - name: 📥 Checkout source code
        uses: actions/checkout@v4

      - name: ⚙️ Set up Kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: 🔐 Set Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: 🔄 Update image in deployment.yaml
        run: |
          IMAGE_TAG=${{ needs.push-image.outputs.short_sha }}
          FULL_IMAGE=${{ env.REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:$IMAGE_TAG
          
          # deployment.yaml 파일 내의 하드코딩된 이미지를 새로 빌드된 이미지로 교체 (sed 명령어 활용)
          sed -i "s|image: .*|image: $FULL_IMAGE|g" deployment.yaml
          
          echo "Updated deployment.yaml:"
          cat deployment.yaml

      - name: 🚀 Deploy to Kubernetes
        run: |
          kubectl apply -f deployment.yaml
          # 배포가 정상적으로 완료(Running 상태)될 때까지 대기
          kubectl rollout status deployment/sk3003-deploy -n skala3-ai1