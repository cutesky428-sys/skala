apiVersion: apps/v1
kind: Deployment
metadata:
  name: sk3003-deploy
  namespace: skala3-ai1
  labels:
    app: sk3003-app
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sk3003-app
      version: v1
  template:
    metadata:
      labels:
        app: sk3003-app
        version: v1
    spec:
      containers:
      - name: sk3003-container
        image: amdp-registry.skala-ai.com/skala26a-ai1/3003:latest
        ports:
        - containerPort: 80
        volumeMounts:
        - name: sk3003-storage
          mountPath: /app/data
      volumes:
      - name: sk3003-storage
        persistentVolumeClaim:
          claimName: sk3003-pvc